<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>lore-weave-watch</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
        h1 { margin-top: 0; }
        .summary { font-size: 1.1rem; margin-bottom: 1rem; }
        .summary span { margin-right: 1rem; }
        .errors { color: #c0392b; }
        .warnings { color: #c08020; }
        .ok { color: #2a7a2a; }
        .stale { color: #888; font-style: italic; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow: auto; }
    </style>
</head>
<body>
<h1>lore-weave-watch</h1>
<div class="summary" id="summary">starting up&hellip;</div>
<pre id="raw"></pre>
<script>
    const SUMMARY = document.getElementById("summary");
    const RAW = document.getElementById("raw");
    const params = new URLSearchParams(location.search);
    const interval = parseInt(params.get("interval") || "1000", 10);

    async function poll() {
        try {
            const res = await fetch("/api/validation");
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            render(data);
        } catch (e) {
            SUMMARY.innerHTML = '<span class="stale">server unreachable: ' + e.message + '</span>';
        }
    }

    function render(data) {
        const s = data.summary;
        const cls = s.errors > 0 ? "errors" : (s.warnings > 0 ? "warnings" : "ok");
        SUMMARY.innerHTML =
            '<span class="' + cls + '">' + s.errors + ' errors / ' + s.warnings + ' warnings</span>' +
            '<span>' + s.notes_served + ' notes served</span>' +
            '<span>' + s.notes_excluded + ' excluded</span>' +
            '<span class="stale">scanned ' + data.scanned_at + '</span>';
        RAW.textContent = JSON.stringify(data.issues, null, 2);
    }

    poll();
    setInterval(poll, interval);
</script>
</body>
</html>
