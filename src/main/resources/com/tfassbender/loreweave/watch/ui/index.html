<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>lore-weave-watch</title>
    <!--
      Icons: Font Awesome 6 Free (CC BY 4.0). https://fontawesome.com/license/free
      Loaded from cdnjs; if offline the icons silently disappear and the rest
      of the UI keeps working (every icon has accessible text or a tooltip).
    -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          referrerpolicy="no-referrer">
    <script>
        // Pre-flight: apply the persisted theme before paint to avoid a flash.
        try {
            if (localStorage.getItem("lww-theme") === "light") {
                document.documentElement.setAttribute("data-theme", "light");
            }
        } catch (e) { /* localStorage may be blocked; default dark is fine */ }
    </script>
    <style>
        /* Dark is the default. Add data-theme="light" on <html> to opt in. */
        :root {
            --fg: #e6edf3;
            --fg-muted: #8b949e;
            --bg: #0d1117;
            --bg-alt: #161b22;
            --border: #30363d;
            --error: #f85149;
            --warning: #d29922;
            --ok: #3fb950;
            --accent: #58a6ff;
            --error-bg: rgba(248, 81, 73, 0.28);
            --warning-bg: rgba(210, 153, 34, 0.28);
            --error-border: rgba(248, 81, 73, 0.5);
            --warning-border: rgba(210, 153, 34, 0.5);
        }
        :root[data-theme="light"] {
            --fg: #1f2328;
            --fg-muted: #57606a;
            --bg: #ffffff;
            --bg-alt: #f6f8fa;
            --border: #d0d7de;
            --error: #cf222e;
            --warning: #bf8700;
            --ok: #1a7f37;
            --accent: #0969da;
            --error-bg: #ffebe9;
            --warning-bg: #fff8c5;
            --error-border: #cf222e;
            --warning-border: #bf8700;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--fg);
            background: var(--bg);
            margin: 0;
            padding: 0;
        }

        header {
            position: sticky;
            top: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            z-index: 10;
        }
        .topline {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .topline h1 {
            font-size: 1rem;
            margin: 0;
            font-weight: 600;
        }
        .vault-path {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.85rem;
            color: var(--fg-muted);
        }
        .stats {
            margin-left: auto;
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
        }
        .stats .errors    { color: var(--error);   font-weight: 600; }
        .stats .warnings  { color: var(--warning); font-weight: 600; }
        .stats .ok        { color: var(--ok);      font-weight: 600; }
        .stats .muted     { color: var(--fg-muted); }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.15rem 0.6rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: default;
            user-select: none;
            white-space: nowrap;
        }
        .chip::before {
            content: "";
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: currentColor;
        }
        .chip.live {
            background: rgba(63, 185, 80, 0.15);
            color: var(--ok);
            border-color: rgba(63, 185, 80, 0.35);
        }
        .chip.offline {
            background: rgba(248, 81, 73, 0.15);
            color: var(--error);
            border-color: rgba(248, 81, 73, 0.35);
        }
        .chip.pending {
            background: transparent;
            color: var(--fg-muted);
            border-color: var(--border);
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            width: 1.85rem;
            height: 1.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            line-height: 1;
        }
        .theme-toggle:hover { color: var(--fg); border-color: var(--fg-muted); }

        h1 .title-icon { color: var(--accent); margin-right: 0.35rem; }

        main { padding: 0.75rem 1.25rem 2rem; }

        section.category {
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.75rem;
            background: var(--bg-alt);
            overflow: hidden;
        }
        section.category.error   { border-left: 3px solid var(--error-border); }
        section.category.warning { border-left: 3px solid var(--warning-border); }
        section.category > h2 {
            margin: 0;
            padding: 0.5rem 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        section.category > h2 .caret {
            display: inline-block;
            transition: transform 0.1s linear;
            color: var(--fg-muted);
            font-size: 0.8em;
        }
        section.category.collapsed > h2 .caret { transform: rotate(-90deg); }
        section.category > h2 .severity-icon { font-size: 0.95em; }
        section.category.error   > h2 .severity-icon { color: var(--error); }
        section.category.warning > h2 .severity-icon { color: var(--warning); }
        section.category.collapsed > ul { display: none; }
        section.category .category-name { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        section.category .count { color: var(--fg-muted); font-weight: 400; }
        section.category.error   > h2 { background: var(--error-bg); }
        section.category.warning > h2 { background: var(--warning-bg); }

        ul.issues {
            list-style: none;
            margin: 0;
            padding: 0;
            background: var(--bg);
        }
        ul.issues > li {
            display: grid;
            grid-template-columns: 1rem 1fr auto;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
        }
        ul.issues > li .dot {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            margin-top: 0.4rem;
        }
        li.error   .dot { background: var(--error); }
        li.warning .dot { background: var(--warning); }
        ul.issues .body { min-width: 0; }
        ul.issues .path {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: var(--accent);
            word-break: break-all;
        }
        ul.issues .message {
            color: var(--fg);
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 0.1rem;
        }

        #empty {
            display: none;
            padding: 2rem;
            text-align: center;
            color: var(--ok);
            font-size: 1.1rem;
        }
        #empty .fa-circle-check { margin-right: 0.4rem; }
        #empty.visible { display: block; }
        #empty.all-hidden { color: var(--fg-muted); }
        #empty.all-hidden .fa-circle-check { display: none; }

        /* Hide buttons (per-issue, per-category) and top-bar restore button */
        .hide-btn {
            background: transparent;
            border: none;
            color: var(--fg-muted);
            opacity: 0.55;
            cursor: pointer;
            padding: 0.15rem 0.35rem;
            border-radius: 3px;
            font: inherit;
            font-size: 0.85em;
            line-height: 1;
        }
        .hide-btn:hover { opacity: 1; color: var(--fg); background: var(--bg-alt); }
        section.category > h2 .hide-btn { margin-left: auto; }
        ul.issues > li .hide-btn { align-self: start; }

        .show-hidden {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .show-hidden:hover { color: var(--fg); border-color: var(--fg-muted); }
        .show-hidden[hidden] { display: none; }
    </style>
</head>
<body>
<header>
    <div class="topline">
        <h1><i class="fa-solid fa-eye title-icon" aria-hidden="true"></i>lore-weave-watch</h1>
        <span class="vault-path" id="vault">&hellip;</span>
        <span class="chip pending" id="status-chip" role="status" title="Waiting for first response">connecting&hellip;</span>
        <div class="stats" id="stats"></div>
        <button id="show-hidden" class="show-hidden" type="button" hidden
                title="Restore all hidden issues">
            <i class="fa-solid fa-eye" aria-hidden="true"></i>
            show <span id="hidden-count">0</span> hidden
        </button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
            <i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true"></i>
        </button>
    </div>
</header>
<main>
    <div id="categories"></div>
    <div id="empty"><i class="fa-solid fa-circle-check" aria-hidden="true"></i> No issues &mdash; looking good!</div>
</main>
<script>
(() => {
    "use strict";

    const params   = new URLSearchParams(location.search);
    const interval = Math.max(200, parseInt(params.get("interval") || "1000", 10));

    const elVault     = document.getElementById("vault");
    const elStats     = document.getElementById("stats");
    const elStatusChip = document.getElementById("status-chip");
    const elCategories = document.getElementById("categories");
    const elEmpty     = document.getElementById("empty");
    const elThemeBtn  = document.getElementById("theme-toggle");
    const elThemeIcon = document.getElementById("theme-icon");
    const elShowHidden = document.getElementById("show-hidden");
    const elHiddenCount = document.getElementById("hidden-count");

    // Session-only set of hidden issue keys. Cleared on reload — the user
    // muted noise for the current session, not persistently.
    const hiddenKeys = new Set();
    // Cache the most recent server payload so hide/unhide can re-render
    // without waiting for the next poll.
    let lastIssues  = [];
    let lastSummary = null;

    // Status chip flips from green ("live") to red ("offline") when no
    // successful poll has landed in this many ms.
    const OFFLINE_AFTER_MS = 5000;

    // --- Theme -----------------------------------------------------------
    // Dark is default. Persist explicit choice in localStorage so it follows
    // the user across reloads. The button label always advertises the OTHER
    // theme — i.e. "light" when dark is active, "dark" when light is active.
    function applyTheme(theme) {
        if (theme === "light") {
            document.documentElement.setAttribute("data-theme", "light");
            elThemeIcon.className = "fa-solid fa-moon";
            elThemeBtn.title = "Switch to dark mode";
            elThemeBtn.setAttribute("aria-label", "Switch to dark mode");
        } else {
            document.documentElement.removeAttribute("data-theme");
            elThemeIcon.className = "fa-solid fa-sun";
            elThemeBtn.title = "Switch to light mode";
            elThemeBtn.setAttribute("aria-label", "Switch to light mode");
        }
    }
    function currentTheme() {
        return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
    }
    try { applyTheme(localStorage.getItem("lww-theme") || "dark"); }
    catch (e) { applyTheme("dark"); }
    elThemeBtn.addEventListener("click", () => {
        const next = currentTheme() === "dark" ? "light" : "dark";
        applyTheme(next);
        try { localStorage.setItem("lww-theme", next); } catch (e) { /* ignore */ }
    });

    // Connection state for the status chip. lastSuccessAt tracks the wall-clock
    // time of the most recent successful poll; lastErrorMsg keeps the most
    // recent fetch failure so its text can show in the offline tooltip.
    let lastSuccessAt = null;
    let lastErrorMsg  = null;
    let timerHandle   = null;

    // Stable per-issue key. Server already orders issues deterministically, so
    // string concatenation suffices (no hashing needed).
    const issueKey = (it) => it.severity + "\0" + it.category + "\0" + it.path + "\0" + it.message;

    async function poll() {
        try {
            const res = await fetch("/api/validation", { cache: "no-store" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            applyData(data);
            lastSuccessAt = Date.now();
            lastErrorMsg  = null;
        } catch (err) {
            lastErrorMsg = err.message || String(err);
        }
        updateStatusChip();
    }

    function applyData(data) {
        elVault.textContent = data.vault || "(no vault)";
        lastIssues  = data.issues || [];
        lastSummary = data.summary || null;
        rerender();
    }

    function rerender() {
        const visible = lastIssues.filter(it => !hiddenKeys.has(issueKey(it)));
        renderStats(visible);
        renderCategories(visible);
        renderHiddenIndicator();
    }

    function renderStats(visible) {
        if (!lastSummary) return;
        const errors   = visible.reduce((n, i) => n + (i.severity === "error"   ? 1 : 0), 0);
        const warnings = visible.reduce((n, i) => n + (i.severity === "warning" ? 1 : 0), 0);
        const errCls  = errors   > 0 ? "errors"   : "muted";
        const warnCls = warnings > 0 ? "warnings" : "muted";
        const okBadge = (errors === 0 && warnings === 0 && hiddenKeys.size === 0)
            ? '<span class="ok">clean</span>' : "";
        const ns = lastSummary.notes_served;
        const nx = lastSummary.notes_excluded;
        elStats.innerHTML =
            okBadge +
            '<span class="' + errCls  + '">' + errors   + ' error'   + (errors   === 1 ? "" : "s") + '</span>' +
            '<span class="' + warnCls + '">' + warnings + ' warning' + (warnings === 1 ? "" : "s") + '</span>' +
            '<span class="muted">' + ns + ' served' + (nx > 0 ? " / " + nx + " excluded" : "") + '</span>';
    }

    function renderHiddenIndicator() {
        if (hiddenKeys.size > 0) {
            elHiddenCount.textContent = hiddenKeys.size;
            elShowHidden.hidden = false;
        } else {
            elShowHidden.hidden = true;
        }
    }

    elShowHidden.addEventListener("click", () => {
        hiddenKeys.clear();
        rerender();
    });

    // The chip text is set only on state transitions (so it does not flicker
     // every second). The tooltip is refreshed on every tick — it is hidden
     // until the user hovers, so it can update freely without visible churn.
    function updateStatusChip() {
        const now = Date.now();
        const ageMs = lastSuccessAt == null ? Infinity : now - lastSuccessAt;
        const live = ageMs < OFFLINE_AFTER_MS;

        let nextClass, nextText, tooltip;
        if (lastSuccessAt == null && lastErrorMsg == null) {
            nextClass = "pending";
            nextText  = "connecting…";
            tooltip   = "Waiting for first response";
        } else if (live) {
            nextClass = "live";
            nextText  = "live";
            tooltip   = "Connected to lore-weave-watch (last response less than "
                + Math.ceil(OFFLINE_AFTER_MS / 1000) + " s ago)";
        } else {
            nextClass = "offline";
            nextText  = "offline";
            const seenPart = lastSuccessAt == null
                ? "no successful response yet"
                : "last response " + relativeAge(ageMs);
            const errPart = lastErrorMsg ? "; " + lastErrorMsg : "";
            tooltip = "Server unreachable" + errPart + " (" + seenPart + ")";
        }

        if (!elStatusChip.classList.contains(nextClass)) {
            elStatusChip.classList.remove("pending", "live", "offline");
            elStatusChip.classList.add(nextClass);
        }
        if (elStatusChip.textContent !== nextText) {
            elStatusChip.textContent = nextText;
        }
        elStatusChip.title = tooltip;
    }

    function relativeAge(ms) {
        const sec = Math.max(0, Math.round(ms / 1000));
        if (sec < 1)    return "just now";
        if (sec < 60)   return sec + " s ago";
        if (sec < 3600) return Math.floor(sec / 60) + " m ago";
        return Math.floor(sec / 3600) + " h ago";
    }

    // --- Diff-aware rendering ---------------------------------------------
    // Each <section.category> represents one category. Each <li[data-key]> is
    // one issue. We update in place so scroll position and the user's collapse
    // toggles survive across polls.

    function renderCategories(issues) {
        if (!issues || issues.length === 0) {
            // Clean state: hide all categories, show the empty-state message.
            while (elCategories.firstChild) elCategories.removeChild(elCategories.firstChild);
            const allHidden = hiddenKeys.size > 0 && lastIssues.length > 0;
            elEmpty.classList.toggle("all-hidden", allHidden);
            elEmpty.innerHTML = allHidden
                ? '<i class="fa-solid fa-eye-slash" aria-hidden="true"></i> All issues hidden &mdash; click "show ' + hiddenKeys.size + ' hidden" above to restore.'
                : '<i class="fa-solid fa-circle-check" aria-hidden="true"></i> No issues &mdash; looking good!';
            elEmpty.classList.add("visible");
            return;
        }
        elEmpty.classList.remove("visible");
        elEmpty.classList.remove("all-hidden");

        // Group issues by category in iteration order (server already sorted
        // them severity-desc, category-asc, ...).
        const groups = []; // [{ category, severity, issues: [] }]
        const groupBy = new Map();
        for (const it of issues) {
            let g = groupBy.get(it.category);
            if (!g) {
                g = { category: it.category, severity: it.severity, issues: [] };
                groupBy.set(it.category, g);
                groups.push(g);
            }
            g.issues.push(it);
        }

        // Build a map of the existing sections keyed by category name.
        const existing = new Map();
        for (const sec of Array.from(elCategories.children)) {
            existing.set(sec.dataset.category, sec);
        }

        // Walk groups in order, reusing or creating sections.
        let prev = null;
        for (const g of groups) {
            let sec = existing.get(g.category);
            if (!sec) {
                sec = makeSection(g);
            } else {
                existing.delete(g.category);
            }
            updateSection(sec, g);
            // Place section after `prev` (or at start). Avoid no-op moves.
            const target = prev ? prev.nextSibling : elCategories.firstChild;
            if (sec !== target) elCategories.insertBefore(sec, target);
            prev = sec;
        }
        // Remove sections whose categories no longer have issues.
        for (const sec of existing.values()) sec.remove();
    }

    function makeSection(g) {
        const sec = document.createElement("section");
        sec.className = "category " + g.severity;
        sec.dataset.category = g.category;
        const sevIcon = g.severity === "error"
            ? "fa-solid fa-triangle-exclamation"
            : "fa-solid fa-circle-exclamation";
        sec.innerHTML =
            '<h2>' +
                '<i class="fa-solid fa-chevron-down caret" aria-hidden="true"></i>' +
                '<i class="' + sevIcon + ' severity-icon" aria-hidden="true"></i>' +
                '<span class="category-name"></span>' +
                '<span class="count"></span>' +
                '<button class="hide-btn hide-category" type="button" ' +
                        'title="Hide all issues in this category" aria-label="Hide all issues in this category">' +
                    '<i class="fa-solid fa-eye-slash" aria-hidden="true"></i>' +
                '</button>' +
            '</h2>' +
            '<ul class="issues"></ul>';
        sec.querySelector("h2").addEventListener("click", (ev) => {
            // Don't collapse when clicking the per-category hide button.
            if (ev.target.closest(".hide-btn")) return;
            sec.classList.toggle("collapsed");
        });
        sec.querySelector(".hide-category").addEventListener("click", (ev) => {
            ev.stopPropagation();
            const cat = sec.dataset.category;
            for (const it of lastIssues) {
                if (it.category === cat) hiddenKeys.add(issueKey(it));
            }
            rerender();
        });
        return sec;
    }

    function updateSection(sec, g) {
        sec.className = "category " + g.severity + (sec.classList.contains("collapsed") ? " collapsed" : "");
        sec.querySelector(".category-name").textContent = g.category;
        sec.querySelector(".count").textContent = "(" + g.issues.length + ")";

        const ul = sec.querySelector("ul.issues");
        const existing = new Map();
        for (const li of Array.from(ul.children)) existing.set(li.dataset.key, li);

        let prev = null;
        for (const it of g.issues) {
            const key = issueKey(it);
            let li = existing.get(key);
            if (!li) {
                li = makeIssue(it, key);
            } else {
                existing.delete(key);
            }
            const target = prev ? prev.nextSibling : ul.firstChild;
            if (li !== target) ul.insertBefore(li, target);
            prev = li;
        }
        for (const li of existing.values()) li.remove();
    }

    function makeIssue(it, key) {
        const li = document.createElement("li");
        li.className = it.severity;
        li.dataset.key = key;
        const dot = document.createElement("span");
        dot.className = "dot";
        const body = document.createElement("div");
        body.className = "body";
        const path = document.createElement("div");
        path.className = "path";
        path.textContent = it.path || "(no path)";
        const msg = document.createElement("div");
        msg.className = "message";
        msg.textContent = it.message || "";
        body.appendChild(path);
        body.appendChild(msg);
        const hideBtn = document.createElement("button");
        hideBtn.type = "button";
        hideBtn.className = "hide-btn hide-issue";
        hideBtn.title = "Hide this issue for the current session";
        hideBtn.setAttribute("aria-label", "Hide this issue");
        hideBtn.innerHTML = '<i class="fa-solid fa-eye-slash" aria-hidden="true"></i>';
        hideBtn.addEventListener("click", () => {
            hiddenKeys.add(key);
            rerender();
        });
        li.appendChild(dot);
        li.appendChild(body);
        li.appendChild(hideBtn);
        return li;
    }

    // --- Bootstrap ---------------------------------------------------------
    poll();
    timerHandle = setInterval(poll, interval);
    // The chip flips green→red when the last success crosses OFFLINE_AFTER_MS,
    // and the tooltip's "X s ago" text needs to advance between polls. A 1 s
    // tick is plenty — chip text only changes on state transitions.
    setInterval(updateStatusChip, 1000);
})();
</script>
</body>
</html>
